name: Build APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      - name: Init x11 submodules
        run: |
             git clone --depth 1 --no-tags --recursive https://github.com/termux/termux-x11.git /tmp/x11-upstream
             for dir in app/x11/app/src/main/cpp/*/; do
               name=$(basename "$dir")
               src="/tmp/x11-upstream/app/src/main/cpp/$name"
               if [ -d "$src" ] && [ ! "$(ls -A "$dir" 2>/dev/null)" ]; then
                 cp -r "$src"/. "$dir"/
               fi
             done
             rm -rf /tmp/x11-upstream
      - name: Build Debug APK
        run: |
             chmod +x ./gradlew
             ./gradlew assembleDebug --no-configuration-cache
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/apk/debug/app-debug.apk
          archive: false
