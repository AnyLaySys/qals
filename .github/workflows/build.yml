name: Build APK
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取
        run: |
          git init
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch --depth 1 --no-tags origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD
          dirs="xorgproto libfontenc pixman libtirpc libxshmfence libxdmcp libxau libxfont libx11 libxkbfile xkbcomp xserver libxcvt libepoxy libxtrans"
          paths=$(for dir in $dirs; do printf "app/src/main/cpp/%s " "$dir"; done)
          git clone --depth 1 --filter=blob:none --no-tags --no-checkout https://github.com/termux/termux-x11.git /tmp/x11-upstream
          git -C /tmp/x11-upstream sparse-checkout init --cone
          git -C /tmp/x11-upstream sparse-checkout set $paths
          git -C /tmp/x11-upstream checkout
          git -C /tmp/x11-upstream submodule update --init --depth 1 --recommend-shallow -- $paths
          mkdir -p app/x11/app/src/main/cpp
          for dir in $dirs; do
            mkdir -p "app/x11/app/src/main/cpp/$dir"
            cp -a "/tmp/x11-upstream/app/src/main/cpp/$dir/." "app/x11/app/src/main/cpp/$dir/"
          done
      - name: 编译
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-configuration-cache
      - name: 上传
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/apk/debug/app-debug.apk
          archive: false