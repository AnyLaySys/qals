name: Build APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      - name: Init x11 submodules
        run: |
             dirs="xorgproto libfontenc pixman libtirpc libxshmfence libxdmcp libxau libxfont libx11 libxkbfile xkbcomp xserver libxcvt libepoxy libxtrans"
             git clone --depth 1 --filter=blob:none --no-tags --no-checkout https://github.com/termux/termux-x11.git /tmp/x11-upstream
             git -C /tmp/x11-upstream sparse-checkout init --cone
             git -C /tmp/x11-upstream sparse-checkout set $(for dir in $dirs; do printf "app/src/main/cpp/%s " "$dir"; done)
             git -C /tmp/x11-upstream checkout
             git -C /tmp/x11-upstream submodule update --init --depth 1 --recommend-shallow -- $(for dir in $dirs; do printf "app/src/main/cpp/%s " "$dir"; done)
             mkdir -p app/x11/app/src/main/cpp
             for dir in $dirs; do
               rm -rf "app/x11/app/src/main/cpp/$dir"
               cp -a "/tmp/x11-upstream/app/src/main/cpp/$dir" "app/x11/app/src/main/cpp/$dir"
             done
             rm -rf /tmp/x11-upstream
      - name: Build Debug APK
        run: |
             chmod +x ./gradlew
             ./gradlew assembleDebug --no-configuration-cache
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/apk/debug/app-debug.apk
          archive: false
