name: Build APK
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
 
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
 
      - name: Enable Termux terminal dependency
        run: sed -i 's|//    implementation("com.github.termux:termux-app:master:terminal-viewer")|    implementation("com.github.termux:termux-app:master:terminal-viewer")|' app/build.gradle.kts

      - name: Build Debug APK
        run: |
             chmod +x ./gradlew
             ./gradlew assembleDebug --no-configuration-cache
 
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RingtoneApp-debug
          path: app/build/outputs/apk/debug/app-debug.apk

